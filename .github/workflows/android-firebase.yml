name: Android Build & Firebase Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Mettre en cache npm
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 3️⃣ Mettre en cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # 4️⃣ Installer Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 5️⃣ Installer les dépendances npm
      - name: Install dependencies
        run: npm install

      # 6️⃣ Build Android avec EAS
      - name: Build Android
        run: npx eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 7️⃣ Installer Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 8️⃣ Télécharger le dernier build Android
      - name: Download latest build
        run: |
          # Installer jq pour parser le JSON
          sudo apt-get update && sudo apt-get install -y jq

          # Récupérer l'ID du dernier build Android
          BUILD_ID=$(npx eas build:list --platform android --limit 1 --json | jq -r '.[0].id')

          # Télécharger ce build
          npx eas build:download --platform android --id $BUILD_ID
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 9️⃣ Distribuer sur Firebase App Distribution
      - name: Upload to Firebase
        run: |
          firebase appdistribution:distribute *.apk \
          --app ${{ secrets.FIREBASE_APP_ID }} \
          --groups testers
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}